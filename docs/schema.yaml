        '200':
          description: No response body
  /api/token/grant:
    post:
      operationId: token_grant_create
      summary: 获取访问令牌
      tags:
      - token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenGrant'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenGrant'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenGrant'
        required: true
      security:
      - BearerAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenGrantResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
          description: ''
        '423':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
          description: ''
  /api/token/refresh:
    post:
      operationId: token_refresh_create
      description: 刷新Token
      summary: 刷新访问令牌
      tags:
      - token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      security:
      - BearerAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenGrantResponse'
          description: ''
        '400':
          content:
            application/json:
