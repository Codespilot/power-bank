                $ref: '#/components/schemas/Message'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
          description: ''
  /api/users/:
    get:
      operationId: users_list
      summary: 获取用户列表
      parameters:
      - in: query
        name: direct_subordinates
        schema:
          type: string
        description: 是否只查询直属下级，传 1 或 true 生效
      - in: query
        name: exclude_id
        schema:
          type: string
        description: 排除指定用户ID
      - in: query
        name: id
        schema:
          type: string
        description: 按用户ID筛选
      - in: query
        name: keyword
        schema:
          type: string
        description: 用户名、手机号或邮箱关键字
      - in: query
        name: limit
        schema:
          type: integer
        description: 每页数量
      - in: query
        name: page
        schema:
          type: integer
        description: 页码
      tags:
      - users
      security:
      - BearerAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUserListList'
          description: ''
  /api/users/{id}:
    get:
      operationId: users_retrieve
      summary: 获取用户详情
