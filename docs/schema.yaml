      tags:
      - users
      security:
      - BearerAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
          description: ''
  /api/users/{id}/assign-superior-agent:
    post:
      operationId: users_assign_superior_agent_create
      summary: 分配上级代理商
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
