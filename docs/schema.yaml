openapi: 3.0.3
info:
  title: 分润管理系统
  version: 1.0.0
  description: 分润管理系统 API 文档
paths:
  /api/agents/save:
    post:
      operationId: agents_save_create
      summary: 分配上级代理商
      tags:
      - agents
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentAssign'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AgentAssign'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AgentAssign'
        required: true
      security:
      - BearerAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
          description: ''
  /api/health/:
    get:
      operationId: health_retrieve
      description: 最小健康检查接口，用于确认服务是否正常运行。
      tags:
      - health
      security:
      - BearerAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/invite-codes/:
    get:
      operationId: invite_codes_retrieve
      description: 查询当前用户的所有邀请码及其注册统计信息。
      summary: 获取邀请码列表
      tags:
      - invite-codes
      security:
      - BearerAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteCodeListResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
    post:
      operationId: invite_codes_create
      description: 为当前用户创建新的邀请码，需指定分润比例。
      summary: 创建邀请码
      tags:
      - invite-codes
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteCodeCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/InviteCodeCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/InviteCodeCreateRequest'
        required: true
      security:
      - BearerAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteCodeCreateResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
        '401':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
  /api/invite-codes/{id}/toggle-status:
    post:
      operationId: invite_codes_toggle_status_create
      description: 启用或作废指定的邀请码。
      summary: 切换邀请码状态
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: 邀请码ID
        required: true
      tags:
      - invite-codes
      security:
      - BearerAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteCodeToggleResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
  /api/items/:
    get:
      operationId: items_list
      description: 示例条目接口，保留基础的增删查改演示能力。
      parameters:
      - name: page
        required: false
        in: query
        description: 分页结果集中的页码。
        schema:
          type: integer
      tags:
      - items
      security:
      - BearerAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedItemList'
          description: ''
    post:
      operationId: items_create
      description: 示例条目接口，保留基础的增删查改演示能力。
      tags:
      - items
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Item'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Item'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Item'
        required: true
      security:
      - BearerAuth: []
      - cookieAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
          description: ''
  /api/merchants/:
    get:
      operationId: merchants_retrieve
      description: 分页查询商户列表，支持按商户名称和代理商关键字筛选。管理员可见所有商户，普通代理商仅可见自己名下的商户。
      summary: 获取商户列表
      parameters:
      - in: query
        name: agent_keyword
        schema:
          type: string
        description: 代理商关键字（手机号/姓名/用户名/邮箱）
      - in: query
        name: limit
        schema:
          type: integer
        description: 每页数量，默认10
      - in: query
        name: merchant_name
        schema:
          type: string
        description: 商户名称关键字
      - in: query
        name: page
        schema:
          type: integer
        description: 页码，默认1
      tags:
      - merchants
      security:
      - BearerAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantListResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantAssignMessage'
          description: ''
  /api/merchants/{id}/assign-agent:
    post:
      operationId: merchants_assign_agent_create
      description: 将单个商户划拨给指定代理商。管理员可划拨任意商户，普通代理商仅能划拨自己名下的商户给自己的直属下级代理商。
      summary: 划拨单个商户
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: 商户ID
        required: true
      tags:
      - merchants
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MerchantAssignAgentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MerchantAssignAgentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MerchantAssignAgentRequest'
        required: true
      security:
      - BearerAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantAssignMessage'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantAssignMessage'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantAssignMessage'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantAssignMessage'
          description: ''
  /api/merchants/{id}/history:
    get:
      operationId: merchants_history_retrieve
      description: 查询指定商户的所有划拨历史记录，包括原代理商和新代理商信息。
      summary: 获取商户划拨历史
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: 商户ID
        required: true
      tags:
      - merchants
      security:
      - BearerAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantHistoryResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantAssignMessage'
          description: ''
  /api/merchants/batch-assign-agent:
    post:
      operationId: merchants_batch_assign_agent_create
      description: 将多个商户批量划拨给指定代理商。管理员可划拨任意商户，普通代理商仅能划拨自己名下的商户给自己的直属下级代理商。
      summary: 批量划拨商户
      tags:
      - merchants
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MerchantBatchAssignAgentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MerchantBatchAssignAgentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MerchantBatchAssignAgentRequest'
        required: true
      security:
      - BearerAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantAssignMessage'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantAssignMessage'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantAssignMessage'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantAssignMessage'
          description: ''
  /api/order-imports/:
    get:
      operationId: order_imports_retrieve
      description: |-
        订单导入任务接口。

        GET 返回导入历史；POST 仅创建导入任务，实际文件解析由后台线程完成。
      tags:
      - order-imports
      security:
      - BearerAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
    post:
      operationId: order_imports_create
      description: |-
        订单导入任务接口。

        GET 返回导入历史；POST 仅创建导入任务，实际文件解析由后台线程完成。
      tags:
      - order-imports
      security:
      - BearerAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/order-imports/running-count:
    get:
      operationId: order_imports_running_count_retrieve
      description: 返回当前仍在执行中的导入任务数量。
      tags:
      - order-imports
      security:
      - BearerAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/orders/:
    get:
      operationId: orders_list
      description: 商户订单分页查询接口，支持关键字与日期范围筛选。
      parameters:
      - name: page
        required: false
        in: query
        description: 分页结果集中的页码。
        schema:
          type: integer
      tags:
      - orders
      security:
      - BearerAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMerchantOrderList'
          description: ''
  /api/profile/:
    get:
      operationId: profile_retrieve
      tags:
      - profile
      security:
      - BearerAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
    post:
      operationId: profile_create
      tags:
      - profile
      security:
      - BearerAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/profile/change-password:
    post:
      operationId: profile_change_password_create
      tags:
      - profile
      security:
      - BearerAuth: []
      - cookieAuth: []
