components:
  schemas:
    AgentAssign:
      type: object
      properties:
        subordinate_id:
          type: string
        superior_id:
          type: string
        superior_phone:
          type: string
        rate:
          type: string
      required:
      - rate
    IdMessage:
      type: object
      properties:
        message:
          type: string
        id:
          type: string
        user_id:
          type: string
        next:
          type: string
      required:
      - message
    InviteCodeCreateRequest:
      type: object
      properties:
        rate:
          type: string
          description: '分润比例 (例如: 0.01)'
      required:
      - rate
    InviteCodeCreateResponse:
      type: object
      properties:
        message:
          type: string
        data:
          type: object
          additionalProperties: {}
      required:
      - data
      - message
    InviteCodeListResponse:
      type: object
      properties:
        message:
          type: string
        count:
          type: integer
        results:
          type: array
          items:
            type: object
            additionalProperties: {}
      required:
      - count
      - message
      - results
    InviteCodeToggleResponse:
      type: object
      properties:
        message:
          type: string
        is_valid:
          type: boolean
      required:
      - is_valid
      - message
    Item:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 120
        description:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
    LoginRequest:
      type: object
      properties:
        username:
          type: string
          description: 用户名、手机号或邮箱
        password:
          type: string
          writeOnly: true
        captcha:
          type: string
        source_token:
          type: string
        next:
          type: string
      required:
      - password
      - username
    MerchantAssignAgentRequest:
      type: object
      properties:
        agent_phone:
          type: string
          description: 代理商手机号
      required:
      - agent_phone
    MerchantAssignMessage:
      type: object
      properties:
        message:
          type: string
          description: 操作结果信息
      required:
      - message
    MerchantBatchAssignAgentRequest:
      type: object
      properties:
        merchant_ids:
          type: array
          items:
            type: integer
          description: 商户ID列表
        agent_phone:
          type: string
          description: 代理商手机号
      required:
      - agent_phone
      - merchant_ids
    MerchantHistoryResponse:
      type: object
      properties:
        count:
          type: integer
          description: 总数
        message:
          type: string
        results:
          type: array
          items:
            type: object
            additionalProperties: {}
      required:
      - count
      - message
      - results
    MerchantListResponse:
      type: object
      properties:
        count:
          type: integer
          description: 总数
        page:
          type: integer
          description: 当前页码
        limit:
          type: integer
          description: 每页数量
        message:
          type: string
        results:
          type: array
          items:
            type: object
            additionalProperties: {}
      required:
      - count
      - limit
      - message
      - page
      - results
    MerchantOrder:
      type: object
      properties:
        id:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        order_no:
          type: string
          maxLength: 64
        order_date:
          type: string
          format: date-time
        bill_month:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
        bill_date:
          type: string
          format: date-time
          nullable: true
        order_type:
          type: string
          maxLength: 10
        order_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,16}(?:\.\d{0,2})?$
        merchant_name:
          type: string
          maxLength: 255
        merchant_profit:
          type: string
          format: decimal
          pattern: ^-?\d{0,16}(?:\.\d{0,2})?$
        agent_profit:
          type: string
          format: decimal
          pattern: ^-?\d{0,16}(?:\.\d{0,2})?$
          nullable: true
        is_capped:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          nullable: true
      required:
      - id
      - is_capped
      - merchant_name
      - merchant_profit
      - order_amount
      - order_date
      - order_type
    Message:
      type: object
      properties:
        message:
          type: string
      required:
      - message
    PaginatedItemList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Item'
    PaginatedMerchantOrderList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/MerchantOrder'
    PaginatedUserListList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/UserList'
    TokenGrant:
      type: object
      properties:
        username:
          type: string
          description: 用户名、手机号或邮箱
        password:
          type: string
          writeOnly: true
      required:
      - password
      - username
    TokenGrantResponse:
      type: object
      properties:
        message:
          type: string
        token_type:
          type: string
        access_token:
          type: string
        expires_in:
          type: integer
        refresh_token:
          type: string
        refresh_expires_in:
          type: integer
        user_id:
          type: string
      required:
      - access_token
      - expires_in
      - message
      - refresh_expires_in
      - refresh_token
      - token_type
      - user_id
    TokenRefresh:
      type: object
      properties:
        refresh_token:
          type: string
      required:
      - refresh_token
    UserCreate:
      type: object
      properties:
        username:
          type: string
        fullname:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email
          nullable: true
        password:
          type: string
          writeOnly: true
        superior_phone:
          type: string
        agent_rate:
          type: string
      required:
      - fullname
      - password
      - phone
      - username
    UserDetail:
      type: object
      properties:
        id:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        username:
          type: string
          maxLength: 32
        fullname:
          type: string
          maxLength: 64
        phone:
          type: string
          maxLength: 11
        email:
          type: string
          nullable: true
          maxLength: 255
        invite_code:
          type: string
          nullable: true
          maxLength: 8
        superior_id:
          type: string
          nullable: true
          readOnly: true
        superior_phone:
          type: string
          nullable: true
          readOnly: true
        superior_agent:
          type: string
          readOnly: true
        agent_rate:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          nullable: true
        total_asset:
          type: string
          readOnly: true
      required:
      - agent_rate
      - id
      - phone
      - superior_agent
      - superior_id
      - superior_phone
      - total_asset
      - username
    UserList:
      type: object
      description: |-
        用于用户列表展示的序列化器，包含用户基本信息和关联的上级代理信息。

        Attributes:
            id: 用户ID，字符串格式。
            username: 用户名。
            fullname: 用户全名。
            phone: 用户手机号。
            email: 用户邮箱。
            invite_code: 用户的邀请码。
            superior_id: 上级代理ID，字符串格式，如果没有上级代理则为None。
            superior_phone: 上级代理手机号，如果没有上级代理或手机号不可用则为None。
            superior_agent: 上级代理展示信息，格式为“姓名（手机号）”，如果没有上级代理则为"--"。
            agent_rate: 用户的代理分润比例，如果没有上级代理则为"--"。
            created_at: 用户创建时间，格式为"YYYY-MM-DD HH:MM:SS"。
            total_asset: 用户总资产，通过关联的Wallet对象计算得出，字符串格式。
      properties:
        id:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        username:
          type: string
          maxLength: 32
        fullname:
          type: string
          maxLength: 64
        phone:
          type: string
        email:
          type: string
        invite_code:
          type: string
          nullable: true
          maxLength: 8
        superior_id:
          type: string
          nullable: true
          readOnly: true
        superior_phone:
          type: string
          nullable: true
          readOnly: true
        superior_agent:
          type: string
          readOnly: true
        agent_rate:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
        total_asset:
          type: string
          readOnly: true
        locked_out:
          type: string
          format: date-time
          nullable: true
      required:
      - agent_rate
      - created_at
      - email
      - id
      - phone
      - superior_agent
      - superior_id
      - superior_phone
      - total_asset
      - username
    UserRegister:
      type: object
      properties:
        username:
          type: string
        fullname:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email
          nullable: true
        password:
          type: string
          writeOnly: true
        confirm_password:
          type: string
          writeOnly: true
        captcha:
          type: string
        invite_code:
          type: string
      required:
      - captcha
      - confirm_password
      - fullname
      - invite_code
      - password
      - phone
      - username
    UserResetPassword:
      type: object
      properties:
        password:
          type: string
          writeOnly: true
      required:
      - password
    WalletInfo:
      type: object
      properties:
        total_amount:
          type: string
          description: 总金额
        frozen_amount:
          type: string
          description: 冻结金额
        pending_amount:
          type: string
          description: 待结算金额
        available_amount:
          type: string
          description: 可用金额
        message:
          type: string
          description: 响应消息
      required:
      - available_amount
      - frozen_amount
      - message
      - pending_amount
      - total_amount
    WalletRecordListResponse:
      type: object
      properties:
        count:
          type: integer
          description: 总数
        page:
          type: integer
          description: 当前页码
        limit:
          type: integer
          description: 每页数量
        message:
          type: string
          description: 响应消息
        results:
          type: array
          items:
            type: object
            additionalProperties: {}
      required:
      - count
      - limit
      - message
      - page
      - results
    WalletWithdrawRequest:
      type: object
      properties:
        amount:
          type: string
          description: 提现金额
        remark:
          type: string
          description: 备注信息
      required:
      - amount
    WalletWithdrawResponse:
      type: object
      properties:
        total_amount:
          type: string
          description: 总金额
        frozen_amount:
          type: string
          description: 冻结金额
        pending_amount:
          type: string
          description: 待结算金额
        available_amount:
          type: string
          description: 可用金额
        withdraw_id:
          type: string
          description: 提现申请ID
        message:
          type: string
          description: 响应消息
      required:
      - available_amount
      - frozen_amount
      - message
      - pending_amount
      - total_amount
      - withdraw_id
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 在请求头中使用 Bearer Token，例如：Bearer eyJ...
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
