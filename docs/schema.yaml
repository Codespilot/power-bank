  /api/wallet:
    get:
      operationId: wallet_retrieve
      description: 查询当前用户的钱包概览信息，包括总金额、冻结金额、待结算金额和可用金额。
      summary: 获取钱包信息
      tags:
      - wallet
      security:
      - BearerAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletInfo'
          description: ''
        '401':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
    post:
      operationId: wallet_create
      description: 提交提现申请，冻结相应金额并生成提现申请单。
      summary: 申请提现
      tags:
      - wallet
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WalletWithdrawRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/WalletWithdrawRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/WalletWithdrawRequest'
        required: true
      security:
      - BearerAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletWithdrawResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '401':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/wallet/record:
    get:
      operationId: wallet_record_retrieve
      description: 分页查询当前用户的钱包流水记录，支持按日期区间过滤。
      summary: 获取钱包流水记录
      parameters:
      - in: query
        name: from
        schema:
          type: string
        description: 起始日期 (YYYY-MM-DD)
      - in: query
        name: limit
        schema:
          type: integer
        description: 每页数量，默认10
      - in: query
        name: page
        schema:
          type: integer
        description: 页码，默认1
      - in: query
        name: to
        schema:
          type: string
        description: 结束日期 (YYYY-MM-DD)
      tags:
      - wallet
      security:
