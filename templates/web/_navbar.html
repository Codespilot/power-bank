{% load static %}
<style>
.navbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 56px;
    background: #fff;
    border-bottom: 1px solid #e5e7eb;
    display: flex;
    align-items: center;
    z-index: 1000;
    box-shadow: 0 2px 8px 0 rgba(36, 60, 120, 0.03);
}
.navbar .nav {
    display: flex;
    gap: 1.5rem;
    margin-left: 2.5rem;
}
.navbar .nav a {
    color: #2f6fed;
    text-decoration: none;
    font-weight: 600;
    font-size: 1.08rem;
    padding: 0.2rem 0.5rem;
    border-radius: 6px;
    transition: background 0.2s;
}
.navbar .nav a:hover, .navbar .nav a.active {
    background: #eaf2ff;
}
.navbar .user {
    margin-left: auto;
    margin-right: 2.5rem;
    color: #333;
    font-size: 1rem;
}
