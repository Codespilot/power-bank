{% extends "web/base.html" %}
{% block title %}代理商管理{% endblock %}
{% block header %}代理商管理{% endblock %}
{% block content %}
<form class="layui-form layui-row layui-col-space16">
    <div class="layui-col-md12" style="display: flex; justify-content: space-between;">
        <div class="layui-form-item">
            <div class="layui-input-group">
                <div class="layui-input-prefix">搜索</div>
                <input type="text" name="keyword" value="{{ request.GET.keyword|default:'' }}" placeholder="关键字"
                    class="layui-input">
                <div class="layui-input-split layui-input-suffix" style="cursor: pointer;" lay-submit
                    lay-filter="agent-search">
                    <i class="layui-icon layui-icon-search"></i>
                </div>
            </div>
        </div>
    </div>
</form>
<table class="layui-hide" id="agent-list"></table>

<script type="text/html" id="agentToolBar">
    <div class="layui-btn-container">
        <button class="layui-btn layui-btn-xs" lay-event="view-detail">查看</button>
        <button class="layui-btn layui-btn-xs layui-btn-normal" lay-event="edit-rate">修改分润比例</button>
    </div>
</script>
{% endblock %}

{% block extra_js %}
<script>
    layui.use(function () {
        var table = layui.table;
        var form = layui.form;
        var layer = layui.layer;

        var tableIns = table.render({
            elem: '#agent-list',
            url: '/api/users/?direct_subordinates=1',
            response: { statusCode: 200 },
            parseData: function (res) {
                return {
                    code: 200,
                    msg: res.message,
                    count: res.count,
                    data: res.results || []
                };
            },
            cols: [[
                { field: 'fullname', title: '姓名', minWidth: 140 },
                { field: 'phone', title: '手机号', width: 140 },
                { field: 'email', title: '邮箱', minWidth: 180 },
                { field: 'invite_code', title: '邀请码', width: 120 },
                { field: 'agent_rate', title: '分润比例', width: 120 },
                { field: 'created_at', title: '注册时间', width: 180 },
                { fixed: 'right', title: '操作', toolbar: '#agentToolBar', minWidth: 170 }
            ]],
            page: true,
            limits: [10, 20, 50, 100],
            height: 'full-300'
        });

        form.on('submit(agent-search)', function (data) {
            table.reload('agent-list', {
                page: { curr: 1 },
                where: Object.assign({}, data.field, { direct_subordinates: 1 })
            });
            return false;
        });

        function showUserDetail(id) {
            fetch('/api/users/' + id + '/')
                .then(function (r) { return r.json(); })
                .then(function (u) {
                    layer.open({
                        title: '用户详情',
                        type: 1,
                        area: ['600px', 'auto'],
                        content: `
                            <div class="layui-form" style="padding: 16px;">
                                <div class="layui-form-item">
                                    <label class="layui-form-label">用户名</label>
                                    <div class="layui-input-block">
                                        <input type="text" value="${u.username}" class="layui-input" readonly>
                                    </div>
                                </div>
                                <div class="layui-form-item">
                                    <label class="layui-form-label">姓名</label>
                                    <div class="layui-input-block">
                                        <input type="text" value="${u.fullname || '--'}" class="layui-input" readonly>
                                    </div>
                                </div>
                                <div class="layui-form-item">
                                    <label class="layui-form-label">邮箱</label>
                                    <div class="layui-input-block">
                                        <input type="text" value="${u.email || '--'}" class="layui-input" readonly>
                                    </div>
                                </div>
                                <div class="layui-form-item">
                                    <label class="layui-form-label">手机号</label>
                                    <div class="layui-input-block">
                                        <input type="text" value="${u.phone || '--'}" class="layui-input" readonly>
                                    </div>
                                </div>
                                <div class="layui-form-item">
                                    <label class="layui-form-label">邀请码</label>
                                    <div class="layui-input-block">
                                        <input type="text" value="${u.invite_code || '--'}" class="layui-input" readonly>
                                    </div>
                                </div>
                                <div class="layui-form-item">
                                    <label class="layui-form-label">分润比例</label>
                                    <div class="layui-input-block">
                                        <input type="text" value="${u.agent_rate || '--'}" class="layui-input" readonly>
                                    </div>
                                </div>
                                <div class="layui-form-item">
                                    <label class="layui-form-label">注册时间</label>
                                    <div class="layui-input-block">
                                        <input type="text" value="${u.created_at || '--'}" class="layui-input" readonly>
                                    </div>
                                </div>
                            </div>
                        `
                    });
                });
        }

        table.on('tool(agent-list)', function (obj) {
            var data = obj.data;
            if (obj.event === 'view-detail') {
                showUserDetail(data.id);
            } else if (obj.event === 'edit-rate') {
                var currentRate = '';
                if (data.agent_rate && data.agent_rate !== '--') {
                    currentRate = String(data.agent_rate).replace('%', '').trim();
                }
                layer.open({
                    title: '修改分润比例',
                    type: 1,
                    area: ['420px', '220px'],
                    content: `
                        <form class="layui-form" lay-filter="agent-rate-form" style="padding:20px;">
                            <input type="hidden" name="subordinate_id" value="${data.id}">
                            <input type="hidden" name="superior_id" value="${data.superior_id || ''}">
                            <label>分润比例</label>
                            <div class="layui-form-item">
                                <input type="text" name="rate" value="${currentRate}" lay-affix="number" placeholder="请输入分润比例，例如25" min="0" max="100" step="1" autocomplete="off" class="layui-input">
                                <label>例如25表示上级代理商分润比例为25%</label>
                            </div>
                            <div class="layui-form-item" style="margin-bottom: 0; text-align: right;">
                                <button class="layui-btn" lay-submit lay-filter="agent-rate-submit">保存</button>
                            </div>
                        </form>
                    `,
                    success: function () {
                        form.render();
                    }
                });
            }
        });

        form.on('submit(agent-rate-submit)', function (data) {
            fetch('/api/agents/save/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data.field)
            }).then(function (response) {
                return response.json().then(function (res) { return { ok: response.ok, body: res }; });
            }).then(function (result) {
                if (result.ok) {
                    layer.closeAll();
                    layer.msg(result.body.message || '修改成功', { icon: 1 });
                    tableIns.reload();
                } else {
                    layer.msg(result.body.message || '修改失败', { icon: 5 });
                }
            });
            return false;
        });
    });
</script>
{% endblock %}
