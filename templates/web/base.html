	<script>
		function getCookie(name) {
			const value = `; ${document.cookie}`;
			const parts = value.split(`; ${name}=`);
			if (parts.length === 2) {
				return parts.pop().split(';').shift();
			}
			return '';
		}

		function getCsrfToken() {
			const meta = document.querySelector('meta[name="csrf-token"]');
			return (meta && meta.getAttribute('content')) || getCookie('csrftoken') || '';
		}

		window.getCookie = window.getCookie || getCookie;
		window.getCsrfToken = window.getCsrfToken || getCsrfToken;

		(function () {
			if (!window.fetch) {
				return;
			}
			const originalFetch = window.fetch.bind(window);
			window.fetch = function (resource, options) {
				const requestOptions = options || {};
				const method = (requestOptions.method || 'GET').toUpperCase();
				const headers = new Headers(requestOptions.headers || {});

				if (!['GET', 'HEAD', 'OPTIONS', 'TRACE'].includes(method) && !headers.has('X-CSRFToken')) {
					const token = getCsrfToken();
					if (token) {
						headers.set('X-CSRFToken', token);
					}
				}

				if (!requestOptions.credentials) {
					requestOptions.credentials = 'same-origin';
				}

				return originalFetch(resource, { ...requestOptions, headers });
			};
		})();
	</script>
