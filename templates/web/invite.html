{% extends "web/base.html" %}
{% block title %}邀请码{% endblock %}
{% block header %}邀请码{% endblock %}
{% block content %}
<div style="margin-bottom: 16px; text-align: right;">
    <button type="button" class="layui-btn" id="add-invite-btn">新增邀请码</button>
</div>
<table class="layui-hide" id="invite-list" lay-filter="invite-list"></table>

{% endblock %}

{% block extra_js %}
<style>
    .invite-popup {
        padding: 20px;
        text-align: center;
    }

    .invite-qrcode {
        display: inline-block;
        padding: 12px;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
    }

    .invite-qrcode img {
        margin: 0 auto;
    }

    .invite-link-wrap {
        margin-top: 16px;
        display: flex;
        justify-content: center;
    }

    .invite-link-wrap .layui-input {
        width: 100%;
        max-width: 360px;
        text-align: center;
    }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
    layui.use(function () {
        var table = layui.table;
        var layer = layui.layer;
        var form = layui.form;

        var tableIns = table.render({
            elem: '#invite-list',
            url: '/api/invite-codes/',
            response: { statusCode: 200 },
            parseData: function (res) {
                return {
                    code: 200,
                    msg: res.message,
                    count: res.count || 0,
                    data: res.results || []
                };
            },
            cols: [[
                { field: 'code', title: '邀请码', minWidth: 140 },
                { field: 'rate', title: '分润比例', width: 130 },
                { field: 'register_count', title: '注册人数', width: 110 },
                { field: 'status_text', title: '状态', width: 100 },
                { field: 'created_at', title: '创建时间', minWidth: 180 },
                {
                    fixed: 'right', title: '操作', width: 150,
                    templet: function (d) {
                        var toggleClass = d.is_valid ? 'layui-btn-danger' : 'layui-btn-normal';
                        var toggleText = d.is_valid ? '作废' : '启用';
                        var showButton = d.is_valid
                            ? '<button class="layui-btn layui-btn-xs" lay-event="show">查看</button>'
                            : '';
                        return '<div class="layui-btn-container">'
                            + showButton
                            + '<button class="layui-btn layui-btn-xs ' + toggleClass + '" lay-event="toggle">' + toggleText + '</button>'
                            + '</div>';
                    }
                }
            ]],
            page: false,
            height: 'full-260'
        });

        function reloadInviteTable() {
            tableIns.reload();
        }

        function showInvitePopup(data) {
            layer.open({
                title: '邀请码详情',
                type: 1,
                area: ['460px', 'auto'],
                content: `
                    <div class="invite-popup">
                        <div id="invite-popup-qrcode" class="invite-qrcode"></div>
                        <div class="invite-link-wrap">
                            <input type="text" id="popup-invite-link" readonly class="layui-input layui-disabled" value="${data.invite_link || ''}">
                        </div>
                        <button type="button" class="layui-btn layui-btn-primary" id="popup-copy-btn" style="margin-top: 16px;">复制链接</button>
                    </div>
                `,
                success: function () {
                    var qrContainer = document.getElementById('invite-popup-qrcode');
                    if (qrContainer && data.invite_link && window.QRCode) {
                        qrContainer.innerHTML = '';
                        new QRCode(qrContainer, {
                            text: data.invite_link,
                            width: 180,
                            height: 180,
                        });
                    }
                    var copyBtn = document.getElementById('popup-copy-btn');
                    if (copyBtn) {
                        copyBtn.addEventListener('click', async function () {
                            var input = document.getElementById('popup-invite-link');
                            try {
                                await navigator.clipboard.writeText(input.value || '');
                                layer.msg('复制成功', { icon: 1 });
                            } catch (err) {
                                input.select();
                                document.execCommand('copy');
                                layer.msg('复制成功', { icon: 1 });
                            }
                        });
                    }
                }
            });
        }

        document.getElementById('add-invite-btn').addEventListener('click', function () {
            layer.open({
                title: '新增邀请码',
                type: 1,
                area: ['420px', 'auto'],
                content: `
                    <form class="layui-form" lay-filter="invite-create-form" style="padding:20px;">
                        <label>分润比例</label>
						<div class="layui-form-item">
                            <input type="text" name="rate" value="" lay-affix="number" placeholder="请输入分润比例，例如25" min="0" max="100" step="1" autocomplete="off" class="layui-input"
							lay-verify="required" lay-reqtext="请填写分润比例"
							 style="margin-bottom: 10px; margin-top: 10px;">
							<blockquote class="layui-elem-quote">例如25表示上级代理商分润比例为25%</blockquote>
                        </div>
                        <div class="layui-form-item" style="margin-bottom:0; text-align:right;">
                            <button class="layui-btn" lay-submit lay-filter="invite-create-submit">保存</button>
                        </div>
                    </form>
                `,
                success: function () {
                    form.render();
                }
            });
        });

        form.on('submit(invite-create-submit)', function (data) {
            fetch('/api/invite-codes/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data.field)
            }).then(function (response) {
                return response.json().then(function (res) { return { ok: response.ok, body: res }; });
            }).then(function (result) {
                if (result.ok) {
                    layer.closeAll();
                    layer.msg(result.body.message || '新增成功', { icon: 1 });
                    reloadInviteTable();
                } else {
                    layer.msg(result.body.message || '新增失败', { icon: 5 });
                }
            });
            return false;
        });

        table.on('tool(invite-list)', function (obj) {
            var data = obj.data;
            if (obj.event === 'show') {
                if (!data.is_valid) {
                    return;
                }
                showInvitePopup(data);
            } else if (obj.event === 'toggle') {
                fetch('/api/invite-codes/' + data.id + '/toggle-status/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                }).then(function (response) {
                    return response.json().then(function (res) { return { ok: response.ok, body: res }; });
                }).then(function (result) {
                    if (result.ok) {
                        layer.msg(result.body.message || '操作成功', { icon: 1 });
                        reloadInviteTable();
                    } else {
                        layer.msg(result.body.message || '操作失败', { icon: 5 });
                    }
                });
            }
        });
    });
</script>
{% endblock %}
