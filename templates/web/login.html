<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Power Bank</title>
    <link href="//unpkg.com/layui@2.13.4/dist/css/layui.css" rel="stylesheet">
    <script src="//unpkg.com/layui@2.13.4/dist/layui.js"></script>
</head>

<body>

    <div class="login-page">

        <form id="login-form" class="layui-form" action="">
            <div class="demo-login-container">
                <div class="layui-form-item">
                    <div class="layui-input-wrap">
                        <div class="layui-input-prefix">
                            <i class="layui-icon layui-icon-username"></i>
                        </div>
                        <input type="text" name="username" value="" lay-verify="required" placeholder="用户名"
                            lay-reqtext="请填写用户名" autocomplete="off" class="layui-input" lay-affix="clear">
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-input-wrap">
                        <div class="layui-input-prefix">
                            <i class="layui-icon layui-icon-password"></i>
                        </div>
                        <input type="password" name="password" value="" lay-verify="required" placeholder="密   码"
                            lay-reqtext="请填写密码" autocomplete="off" class="layui-input" lay-affix="eye">
                    </div>
                </div>
                {% if need_captcha %}
                <div class="layui-form-item">
                    <div class="layui-row">
                        <div class="layui-col-xs7">
                            <div class="layui-input-wrap">
                                <div class="layui-input-prefix">
                                    <i class="layui-icon layui-icon-vercode"></i>
                                </div>
                                <input type="text" name="captcha" value="" lay-verify="required" placeholder="验证码"
                                    lay-reqtext="请填写验证码" autocomplete="off" class="layui-input" lay-affix="clear">
                            </div>
                        </div>
                        <div class="layui-col-xs5">
                            <div style="margin-left: 10px;">
                                <img id="login-captcha-img" src="/login/captcha/" alt="验证码" class="captcha-image"
                                    title="点击刷新验证码" onclick="this.src='/login/captcha/?t=' + Date.now();">
                            </div>
                        </div>
                    </div>
                </div>
                {% endif %}
                <div class="layui-form-item">
                    <button type="submit" class="layui-btn layui-btn-fluid" lay-submit
                        lay-filter="btn-login">登录</button>
                </div>
                <div style="text-align:center; color:#666;">
                    还没有账号？<a href="/register" style="color:#1E9FFF;">去注册</a>
                </div>
            </div>
        </form>

        <style>
            html,
            body {
                height: 100%;
                margin: 0;
            }

            .captcha-image {
                width: 100%;
                height: 36px;
                object-fit: cover;
                border: 1px solid #dbe3f0;
                border-radius: 0px;
                cursor: pointer;
                background: #edf3ff;
            }

            .login-page {
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 24px;
                box-sizing: border-box;
                background: #f8fafc;
            }

            .demo-login-container {
                width: 320px;
                margin: 0 auto;
                padding: 24px;
                background: #fff;
                border-radius: 10px;
                box-shadow: 0 4px 18px rgba(15, 23, 42, 0.08);
            }

            .demo-login-other .layui-icon {
                position: relative;
                display: inline-block;
                margin: 0 2px;
                top: 2px;
                font-size: 26px;
            }
        </style>

        <script>
            function getCookie(name) {
                const value = `; ${document.cookie}`;
                const parts = value.split(`; ${name}=`);
                if (parts.length === 2) {
                    return parts.pop().split(';').shift();
                }
                return '';
            }

            layui.use(function () {
                var form = layui.form;
                var layer = layui.layer;
                var loginForm = document.getElementById('login-form');

                async function submitLogin(payload) {
                    const response = await fetch('/api/auth/login/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': getCookie('csrftoken'),
                        },
                        credentials: 'same-origin',
                        body: JSON.stringify(payload),
                    });

                    const response_data = await response.json();

                    if (response.ok && response_data.next) {
                        window.setTimeout(() => window.location.href = response_data.next, 600);
                    } else if (!response.ok) {
                        layer.msg(response_data.message || '登录失败', { icon: 5 });
                        window.setTimeout(() => window.location.reload(), 700);
                    }
                    return false;
                }

                form.on('submit(btn-login)', function (data) {
                    submitLogin(data.field);
                    return false;
                });

                if (loginForm) {
                    loginForm.addEventListener('submit', function (event) {
                        event.preventDefault();
                        const formData = new FormData(loginForm);
                        submitLogin(Object.fromEntries(formData.entries()));
                    });
                }
            });
        </script>
    </div>
</body>

</html>
