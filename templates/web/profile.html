{% extends "web/base.html" %}
{% block header %}个人资料{% endblock %}
{% block content %}
<div class="layui-row layui-col-space16">
    <div class="layui-col-md6">
        <div class="layui-card">
            <div class="layui-card-header">基本资料</div>
            <div class="layui-card-body">
                <form class="layui-form" lay-filter="profile-form">
                    <div class="layui-form-item">
                        <label class="layui-form-label">用户名</label>
                        <div class="layui-input-block">
                            <input type="text" name="username" readonly class="layui-input layui-disabled">
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <label class="layui-form-label">姓名</label>
                        <div class="layui-input-block">
                            <input type="text" name="fullname" placeholder="请输入姓名" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <label class="layui-form-label">手机号</label>
                        <div class="layui-input-block">
                            <input type="text" name="phone" placeholder="请输入手机号" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <label class="layui-form-label">邮箱</label>
                        <div class="layui-input-block">
                            <input type="text" name="email" placeholder="请输入邮箱" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <label class="layui-form-label">上级代理商</label>
                        <div class="layui-input-block">
                            <input type="text" name="superior_agent" readonly class="layui-input layui-disabled">
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <label class="layui-form-label">分润比例</label>
                        <div class="layui-input-block">
                            <input type="text" name="agent_rate" readonly class="layui-input layui-disabled">
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <div class="layui-input-block">
                            <button class="layui-btn" lay-submit lay-filter="profile-submit">确认修改</button>
                            <button type="button" class="layui-btn layui-btn-primary" id="profile-reset-btn">重新填写</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="layui-col-md6">
        <div class="layui-card">
            <div class="layui-card-header">修改密码</div>
            <div class="layui-card-body">
                <form class="layui-form" lay-filter="password-form">
                    <div class="layui-form-item">
                        <label class="layui-form-label">原密码</label>
                        <div class="layui-input-block">
                            <input type="password" name="old_password" placeholder="请输入原密码" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <label class="layui-form-label">新密码</label>
                        <div class="layui-input-block">
                            <input type="password" name="new_password" placeholder="请输入新密码" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <label class="layui-form-label">确认密码</label>
                        <div class="layui-input-block">
                            <input type="password" name="confirm_password" placeholder="请再次输入新密码" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <div class="layui-input-block">
                            <button class="layui-btn" lay-submit lay-filter="password-submit">确认修改</button>
                            <button type="button" class="layui-btn layui-btn-primary" id="password-reset-btn">重新填写</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>  
    </div>

    <div class="layui-col-md6">
        <div class="layui-card" style="margin-bottom: 16px;">
            <div class="layui-card-header">邀请面板</div>
            <div class="layui-card-body invite-panel">
                <div id="invite-qrcode" class="invite-qrcode"></div>
                <div class="layui-form-item" style="margin-top: 16px;">
                    <input type="text" id="invite-link" readonly class="layui-input layui-disabled" value="">
                </div>
                <div style="text-align: center;">
                    <button type="button" class="layui-btn layui-btn-primary" id="copy-invite-link-btn">复制链接</button>
                </div>
            </div>
        </div>

        
    </div>
</div>
{% endblock %}

{% block extra_js %}
<style>
    .invite-panel {
        text-align: center;
    }
    .invite-qrcode {
        display: inline-block;
        padding: 12px;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        min-height: 204px;
    }
    .invite-qrcode img {
        margin: 0 auto;
    }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
    layui.use(function () {
        var form = layui.form;
        var layer = layui.layer;

        function loadProfile() {
            fetch('/api/profile/')
                .then(function (response) { return response.json(); })
                .then(function (res) {
                    if (res.message !== '查询成功') {
                        layer.msg(res.message || '加载失败', { icon: 5 });
                        return;
                    }
                    form.val('profile-form', {
                        username: res.username || '',
                        fullname: res.fullname || '',
                        phone: res.phone || '',
                        email: res.email || '',
                        superior_agent: res.superior_agent || '--',
                        agent_rate: res.agent_rate || '--'
                    });

                    var inviteLink = res.invite_link || '';
                    var linkInput = document.getElementById('invite-link');
                    var qrContainer = document.getElementById('invite-qrcode');
                    if (linkInput) {
                        linkInput.value = inviteLink;
                    }
                    if (qrContainer) {
                        qrContainer.innerHTML = '';
                        if (inviteLink && window.QRCode) {
                            new QRCode(qrContainer, {
                                text: inviteLink,
                                width: 180,
                                height: 180,
                            });
                        }
                    }
                });
        }

        loadProfile();

        form.on('submit(profile-submit)', function (data) {
            fetch('/api/profile/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data.field)
            }).then(function (response) {
                return response.json();
            }).then(function (res) {
                if (res.message === '资料修改成功') {
                    layer.msg('资料修改成功', { icon: 1 });
                    loadProfile();
                } else {
                    layer.msg(res.message || '修改失败', { icon: 5 });
                }
            });
            return false;
        });

        form.on('submit(password-submit)', function (data) {
            fetch('/api/profile/change-password/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data.field)
            }).then(function (response) {
                return response.json();
            }).then(function (res) {
                if (res.message === '密码修改成功') {
                    layer.msg('密码修改成功', { icon: 1 });
                    document.getElementById('password-reset-btn').click();
                } else {
                    layer.msg(res.message || '修改失败', { icon: 5 });
                }
            });
            return false;
        });

        document.getElementById('profile-reset-btn').addEventListener('click', function () {
            loadProfile();
        });

        document.getElementById('password-reset-btn').addEventListener('click', function () {
            form.val('password-form', {
                old_password: '',
                new_password: '',
                confirm_password: ''
            });
        });

        document.getElementById('copy-invite-link-btn').addEventListener('click', async function () {
            var linkInput = document.getElementById('invite-link');
            var inviteLink = (linkInput && linkInput.value) || '';
            if (!inviteLink) {
                layer.msg('邀请链接为空', { icon: 0 });
                return;
            }
            try {
                await navigator.clipboard.writeText(inviteLink);
                layer.msg('复制成功', { icon: 1 });
            } catch (err) {
                linkInput.select();
                document.execCommand('copy');
                layer.msg('复制成功', { icon: 1 });
            }
        });
    });
</script>
{% endblock %}
