{% extends "web/base.html" %}
{% block title %}任务管理{% endblock %}
{% block header %}任务管理{% endblock %}
{% block content %}
<form class="layui-form layui-row layui-col-space16">
    <div class="layui-col-md5">
        <div class="layui-form-item">
            <div class="layui-inline">
                <label class="layui-form-label search-label">运行时间</label>
                <div class="layui-inline" id="task-date-range">
                    <div class="layui-input-inline">
                        <input type="text" name="from" autocomplete="off" id="task-date-from" class="layui-input" placeholder="开始日期">
                    </div>
                    <div class="layui-form-mid">-</div>
                    <div class="layui-input-inline">
                        <input type="text" name="to" autocomplete="off" id="task-date-to" class="layui-input" placeholder="结束日期">
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="layui-col-md3">
        <div class="layui-form-item">
            <div class="layui-input-group">
                <div class="layui-input-prefix search-label">执行日期</div>
                <input type="text" name="run_date" autocomplete="off" id="task-run-date" class="layui-input" placeholder="留空默认执行昨日">
            </div>
        </div>
    </div>
    <div class="layui-col-md4" style="text-align: right;">
        <button type="button" class="layui-btn layui-btn-primary" lay-submit lay-filter="task-search" style="margin-right: 8px;">
            <i class="layui-icon layui-icon-search"></i> 搜索
        </button>
        <button type="button" class="layui-btn" id="task-run-btn">
            <i class="layui-icon layui-icon-play"></i> 手动执行
        </button>
    </div>
</form>

<table class="layui-hide" id="task-record-list"></table>
{% endblock %}

{% block extra_js %}
<script>
    layui.use(function () {
        var table = layui.table;
        var form = layui.form;
        var laydate = layui.laydate;

        laydate.render({
            elem: '#task-date-range',
            range: ['#task-date-from', '#task-date-to'],
            rangeLinked: true
        });

        laydate.render({
            elem: '#task-run-date'
        });

        table.render({
            elem: '#task-record-list',
            id: 'taskRecordTable',
            url: '/api/profit-tasks',
            response: {
                statusCode: 200
            },
            parseData: function (res) {
                return {
                    code: 200,
                    msg: res.message || '',
                    count: res.count || 0,
                    data: res.results || []
                };
            },
            cols: [[
                { field: 'id', title: 'ID', width: 200 },
                { field: 'run_time', title: '运行时间', width: 180 },
                { field: 'duration_ms', title: '持续时间(ms)', width: 130, align: 'right' },
                { field: 'data_scanned', title: '扫描数据量', width: 120, align: 'right' },
                { field: 'profit_data_count', title: '分润数据量', width: 120, align: 'right' },
                { field: 'error_message', title: '错误消息', minWidth: 240 },
                { field: 'created_at', title: '记录时间', width: 180 }
            ]],
            page: true,
            limit: 10,
            limits: [10, 20, 50, 100],
            height: 'full-300'
        });

        form.on('submit(task-search)', function (data) {
            table.reload('taskRecordTable', {
                page: {
                    curr: 1
                },
                where: data.field
            });
            return false;
        });

        document.getElementById('task-run-btn').addEventListener('click', async function () {
            var runDate = (document.getElementById('task-run-date').value || '').trim();
            var loadingIndex = layer.load(1, { shade: 0.2 });
            try {
                var response = await fetch('/api/profit-tasks', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': window.getCsrfToken ? window.getCsrfToken() : ''
                    },
                    credentials: 'same-origin',
                    body: JSON.stringify({ run_date: runDate })
                });
                var res = await response.json();
                if (!response.ok) {
                    layer.msg(res.message || '执行失败', { icon: 5 });
                    return;
                }
                layer.msg(res.message || '执行成功', { icon: 1 });
                table.reload('taskRecordTable');
            } catch (err) {
                layer.msg('执行失败，请稍后重试', { icon: 5 });
            } finally {
                layer.close(loadingIndex);
            }
        });
    });
</script>
{% endblock %}
