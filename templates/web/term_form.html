{% extends "web/base.html" %}
{% block title %}{% if term_id %}编辑协议{% else %}新增协议{% endif %}{% endblock %}
{% block header %}{% if term_id %}编辑协议{% else %}新增协议{% endif %}{% endblock %}
{% block content %}

<div class="layui-row">
	<div class="layui-col-md9">
		<div class="layui-card">
			<div class="layui-card-body">
				<form class="layui-form" lay-filter="term-form">
					<input type="hidden" name="id" value="{{ term_id }}">

					<div class="layui-form-item">
						<label class="layui-form-label required">名称</label>
						<div class="layui-input-block">
							<input type="text" name="name" id="field-name" placeholder="请输入协议名称" maxlength="50"
								class="layui-input" lay-verify="required" lay-reqtext="请输入协议名称">
						</div>
					</div>

					<div class="layui-form-item">
						<label class="layui-form-label required">类型</label>
						<div class="layui-input-block">
							<select name="type" id="field-type" lay-verify="required" lay-reqtext="请选择协议类型">
								<option value="">请选择</option>
								<option value="1">隐私政策</option>
								<option value="2">用户协议</option>
							</select>
						</div>
					</div>

					<div class="layui-form-item">
						<label class="layui-form-label required">平台</label>
						<div class="layui-input-block">
							<select name="platform" id="field-platform" lay-verify="required" lay-reqtext="请选择平台">
								<option value="">请选择</option>
								<option value="1">全部</option>
								<option value="2">Web</option>
								<option value="3">小程序</option>
								<option value="4">App</option>
								<option value="5">其他</option>
							</select>
						</div>
					</div>

					<div class="layui-form-item">
						<label class="layui-form-label required">内容</label>
						<div class="layui-input-block">
							<!-- <textarea name="content" id="field-content" placeholder="请输入协议内容，支持HTML格式"
								class="layui-textarea" style="min-height: 300px;" lay-verify="required"
								lay-reqtext="请输入协议内容"></textarea> -->

							<div id="editor—wrapper" style="border: 1px solid #eee; border-radius: 2px;">
								<div id="toolbar-container"><!-- 工具栏 --></div>
								<div id="editor-container" style="min-height: 300px;"><!-- 编辑器 --></div>
							</div>
						</div>
					</div>

					<div class="layui-form-item">
						<div class="layui-input-block">
							<button class="layui-btn" lay-submit lay-filter="term-submit">保存</button>
							<a class="layui-btn layui-btn-primary" href="/term">返回</a>
						</div>
					</div>
				</form>
			</div>
		</div>
	</div>
</div>

<style>
	div[role="textarea"] {
		min-height: 300px !important;
		height: 100% !important;
	}
</style>
{% endblock %}

{% block extra_js %}
<!-- 引入 css -->
<link href="https://unpkg.com/@wangeditor/editor@latest/dist/css/style.css" rel="stylesheet">

<!-- 引入 js -->
<script src="https://unpkg.com/@wangeditor/editor@latest/dist/index.js"></script>


<script>
	//var E = window.wangEditor; // 全局变量

	const { createEditor, createToolbar } = window.wangEditor

	const editorConfig = {
		placeholder: '请输入内容',
		onChange(editor) {
			const html = editor.getHtml()
			console.log('editor content', html)
			// 也可以同步到 <textarea>
		},
	}

	const editor = createEditor({
		selector: '#editor-container',
		html: '<p><br></p>',
		config: editorConfig,
		mode: 'simple', // or 'simple'
	})

	const toolbarConfig = {
		toolbarKeys: [
			'header1', 'header2', 'header3', 'header4', 'header5', '|',
			'bold', 'italic', 'underline', 'through', 'color', 'bgColor', 'clearStyle', '|',
			'lineHeight','fontSize','fontFamily','|',
			// 'link', 'list', 'justify', '|',
			'undo', 'redo'
		]
		// toolbarKeys:[
		// 	'headerSelect','|',
		// 	'bold', 'italic', 'underline', 'strikeThrough', '|',
		// 	'foreColor', 'backColor', '|',
		// 	'link', 'list', 'justify', '|'
		// ]
	}

	const toolbar = createToolbar({
		editor,
		selector: '#toolbar-container',
		config: toolbarConfig,
		mode: 'simple', // or 'simple'
	})

	layui.use(function () {
		var form = layui.form;
		var layer = layui.layer;
		var termId = '{{ term_id }}';

		// 编辑模式加载数据
		if (termId) {
			fetch('/api/terms/' + termId)
				.then(function (response) { return response.json(); })
				.then(function (res) {
					if (res.id) {
						form.val('term-form', {
							name: res.name || '',
							type: String(res.type || ''),
							platform: String(res.platform || ''),
							content: res.content || ''
						});

						editor.setHtml(res.content || '');

					} else {
						layer.msg(res.message || '加载失败', { icon: 5 });
					}
				})
				.catch(function () {
					layer.msg('加载失败', { icon: 5 });
				});
		}

		// 提交表单
		form.on('submit(term-submit)', function (data) {
			var url = '/api/terms';
			var method = 'POST';

			if (termId) {
				url = '/api/terms/' + termId;
			}

			data.field.content = editor.getHtml();

			fetch(url, {
				method: method,
				headers: {
					'Content-Type': 'application/json',
					'X-CSRFToken': document.querySelector('meta[name="csrf-token"]').content
				},
				body: JSON.stringify(data.field)
			})
				.then(function (response) { return response.json(); })
				.then(function (res) {
					if (res.message === '新增成功' || res.message === '修改成功') {
						layer.msg(res.message, { icon: 1 }, function () {
							window.location.href = '/term';
						});
					} else {
						layer.msg(res.message || '操作失败', { icon: 5 });
					}
				})
				.catch(function () {
					layer.msg('请求失败', { icon: 5 });
				});

			return false;
		});
	});
</script>
<style>
	.layui-form-label.required:before {
		content: '* ';
		color: #ff5722;
	}
</style>
{% endblock %}
